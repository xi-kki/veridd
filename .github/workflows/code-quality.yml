# ═══════════════════════════════════════════════════════════════
# 🔬 VERIDD Code Quality Pipeline
#
# Runs on every push and PR:
#   1. Lint (ESLint)
#   2. Format check (Prettier)
#   3. TypeScript type-check
#   4. Secret scan (Gitleaks)
#   5. Solidity compilation
#   6. Smart contract tests
#   7. Frontend build
#   8. Commit message lint
#
# Docs: https://github.com/xi-kki/veridd
# ═══════════════════════════════════════════════════════════════

name: 🔬 Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & Format & TypeCheck ──────────────────────────
  lint-format-typecheck:
    name: Lint + Format + TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: npm ci
      - name: ESLint
        run: npx eslint src/ --ext .js,.ts,.jsx,.tsx --max-warnings=10
      - name: Prettier Check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}" --ignore-path ../.gitignore
      - name: TypeScript Check
        run: npx tsc --noEmit

  # ── 2. Secret Scanning ───────────────────────────────────
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Regex Fallback Scan
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          if grep -rE '(API[_-]?KEY|SECRET|PASSWORD|TOKEN|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|vcp_[a-zA-Z0-9]{30,})' \
            --include='*.{js,ts,py,sol,sh,env,yml,yaml,json,md}' \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude-dir=artifacts --exclude-dir=cache \
            --exclude-dir=typechain-types --exclude-dir=dist --exclude-dir=dev .; then
            echo "❌ Potential secrets detected in code!"
            exit 1
          fi
          echo "✅ No secrets found"

  # ── 3. Smart Contracts ───────────────────────────────────
  contracts:
    name: Solidity Compile + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'contracts/package-lock.json'
      - run: npm ci
      - name: Compile
        run: npx hardhat compile
      - name: Run Tests
        run: npx hardhat test

  # ── 4. Frontend Build ────────────────────────────────────
  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ── 5. Commit Message Lint (PR only) ─────────────────────
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Validate commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── 6. Dependency Audit ─────────────────────────────────
  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Root Audit
        run: npm audit --audit-level=high || true
      - name: Frontend Audit
        working-directory: frontend
        run: npm audit --audit-level=high || true
      - name: Runner Audit
        working-directory: runner
        run: npm audit --audit-level=high || true
