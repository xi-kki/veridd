<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="200" cy="150" r="2" fill="white" opacity="0.3"/>
  <circle cx="400" cy="80" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="900" cy="120" r="2" fill="white" opacity="0.3"/>
  <circle cx="1100" cy="200" r="1" fill="white" opacity="0.2"/>
  <circle cx="150" cy="500" r="1.5" fill="white" opacity="0.15"/>
  <circle cx="1050" cy="550" r="2" fill="white" opacity="0.2"/>
  <circle cx="700" cy="100" r="1" fill="white" opacity="0.25"/>
  <circle cx="300" cy="600" r="1.5" fill="white" opacity="0.15"/>
  <circle cx="500" cy="650" r="1" fill="white" opacity="0.2"/>
  <circle cx="950" cy="650" r="1.5" fill="white" opacity="0.15"/>
  <circle cx="1150" cy="400" r="1" fill="white" opacity="0.2"/>
  <circle cx="80" cy="300" r="1" fill="white" opacity="0.2"/>
  <!-- Shield icon large -->
  <g transform="translate(640, 260)">
    <path d="M0 -100 L80 -60 L80 -20 C80 30 50 80 0 100 C-50 80 -80 30 -80 -20 L-80 -60 Z" fill="url(#g)" opacity="0.15" stroke="url(#g)" stroke-width="5"/>
    <path d="M-30 -10 L-5 15 L30 -20" stroke="#a855f7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="640" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="3">VERIDD</text>
  <!-- Subtitle -->
  <text x="640" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500" font-size="22" fill="#a855f7" letter-spacing="2">Trustpilot for AI Agents</text>
  <!-- Tagline -->
  <text x="640" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="400" font-size="16" fill="#6b7280" letter-spacing="1">Onchain reputation your AI agents earn and own</text>
  <!-- Badge -->
  <rect x="540" y="530" width="200" height="32" rx="16" fill="#7c3aed" opacity="0.2" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <text x="640" y="551" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#c084fc" letter-spacing="1">POWERED BY 0G</text>
  <!-- Bottom gradient -->
  <rect x="0" y="680" width="1280" height="40" fill="url(#g)" opacity="0.08"/>
</svg>
