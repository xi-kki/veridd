<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="v" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#a855f7" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="280" width="1280" height="2" fill="url(#accent-line)"/>
  <rect x="0" y="358" width="1280" height="2" fill="url(#accent-line)"/>

  <!-- Double-V shield (large) -->
  <g transform="translate(920, 120)">
    <path d="M0 40 L80 160 L160 40 L190 70 L80 230 L-30 70 Z" 
          fill="none" stroke="url(#v)" stroke-width="6" stroke-linejoin="round" opacity="0.7"/>
    <path d="M35 75 L80 130 L125 75" 
          fill="none" stroke="#a855f7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <circle cx="10" cy="55" r="5" fill="#34d399"/>
    <circle cx="150" cy="55" r="5" fill="#34d399"/>
    <path d="M60 115 L80 140 L110 95" 
          fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="100" y="200" font-family="'Courier New', monospace" font-size="72" font-weight="900" fill="#a855f7" letter-spacing="8">
    VERIDD
  </text>

  <!-- Tagline -->
  <text x="100" y="260" font-family="'Courier New', monospace" font-size="22" fill="#94a3b8" letter-spacing="3">
    DECENTRALIZED REPUTATION FOR AI AGENTS
  </text>

  <!-- Description -->
  <text x="100" y="320" font-family="'Courier New', monospace" font-size="15" fill="#64748b" letter-spacing="1">
    A credit score for AI agents, built on 0G Chain + 0G Storage + 0G Compute + Agentic ID
  </text>

  <!-- Badges -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#a855f7" opacity="0.15"/>
    <text x="65" y="21" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#a855f7">0G Chain</text>

    <rect x="145" y="0" width="140" height="32" rx="16" fill="#34d399" opacity="0.15"/>
    <text x="215" y="21" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#34d399">0G Storage</text>

    <rect x="300" y="0" width="150" height="32" rx="16" fill="#22d3ee" opacity="0.15"/>
    <text x="375" y="21" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#22d3ee">0G Compute</text>

    <rect x="465" y="0" width="140" height="32" rx="16" fill="#c084fc" opacity="0.15"/>
    <text x="535" y="21" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#c084fc">Agentic ID</text>
  </g>

  <!-- Footer -->
  <text x="1280" y="600" text-anchor="end" font-family="'Courier New', monospace" font-size="12" fill="#4b5563" letter-spacing="2">
    BUILT FOR THE 0G ZERO CUP 2026
  </text>
</svg>
